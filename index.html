<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8">
    <title>Emiciclo</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  </head>

  <body>
    <a-scene>

      <a-assets>
        <a-asset-item id="bacheca" src="modelli/Billboard.glb"></a-asset-item>
        <audio id="audio-guida" src="audio/guida_emiciclo.mp3" preload="auto"></audio>
        <img id="cartello" src="img/cartello.jpg">
        <img id="sfondo" src="img/maps360.jpg">
      </a-assets>

      <a-sky src="#sfondo" rotation="4 -90 0"></a-sky>


      <a-light type="ambient" color="#ffffff" intensity="0.7"></a-light>

      <a-light type="directional" color="#ffffff" intensity="0.6" position="5 10 5"></a-light>


<!--Bacheca informativa-->
    <a-entity gltf-model="#bacheca" position="4.35868 -2.354 3.861" scale="10 9 9" rotation="0 352.32 0" class="clickable" info-portale="">

        <a-image src="#cartello" width="0.40" height="0.30" position="0.093 0.111 0.032" rotation="0 150 0" material="shader: standard; npot: true" geometry="">
        </a-image>
      </a-entity>


  

    <!--portale-->

  <a-entity id="PORTONE" position="10 -1 15" scale="1.2 1.2 1.2">

  <a-torus
    color="#FF4500" 
    radius="1"
    radius-tubular="0.04"
    material="emissive: #FF4500; emissiveIntensity: 0.5"
    animation="property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear">
  </a-torus>

  <a-circle
    class="clickable"
    radius="1"
    color="#4d0000"
    opacity="0.2" 
    side="double"
    link="href: emiciclo.html; title: Esterno dell'Emiciclo, Struttura  ; visualAspectEnabled: false">
  </a-circle>
  
  <a-text
    value="Visita"
    align="center"
    position="0 0 0"
    scale="2 2 2"
    color="#FFFFFF"
    rotation="0 180 0"
    font="roboto">
  </a-text>

  </a-entity>

      
      <a-entity id="camera-rig" position="11 0 0" rotation = "0 180 0">
        <a-entity 
          id="user-camera" 
          camera 
          look-controls 
          wasd-controls="acceleration: 20;"
          cursor="rayOrigin: mouse"
          raycaster="objects: .clickable">
          <a-cursor color="#2196F3"></a-cursor>
        </a-entity>
      </a-entity>

    </a-scene>
  </body>
</html>
