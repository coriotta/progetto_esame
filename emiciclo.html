<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8">
    <title>Emiciclo</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  </head>

  <body>
    <a-scene>
     

      <a-assets>
        <img id="emiciclo" src="img/emiciclo360.jpg">
      </a-assets>



      <a-sky src="#emiciclo" rotation="0 -90 0"></a-sky>


      <a-light type="ambient" color="#ffffff" intensity="0.5"></a-light>

      <a-light type="directional" color="#ffffff" intensity="0.2" position="5 10 5"></a-light>





<!--portale per andare avanti-->
      <a-entity id="PORTONE" position="12 -2 -20" scale="1.2 1.2 1.2">

  <a-torus
    color="#FF4500" 
    radius="1"
    radius-tubular="0.04"
    material="emissive: #FF4500; emissiveIntensity: 0.5"
    animation="property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear">
  </a-torus>

  <a-circle
    class="clickable"
    radius="1"
    color="#4d0000"
    opacity="0.7" 
    side="double"
    link="href: portone.html; title: Colonnato ; visualAspectEnabled: false">
  </a-circle>
  
  <a-text
    value="Portone"
    align="center"
    position="0 0 0.05"
    scale="2 2 2"
    color="#FFFFFF"
    font="roboto">
  </a-text>

</a-entity>


<!--portale per tornare indietro-->

  <a-entity id="STRADA" position="7 -2 20" scale="1.2 1.2 1.2">

  <a-torus
    color="#FF4500" 
    radius="1"
    radius-tubular="0.04"
    material="emissive: #FF4500; emissiveIntensity: 0.5"
    animation="property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear">
  </a-torus>

  <a-circle
    class="clickable"
    radius="1"
    color="#4d0000"
    opacity="0.7" 
    side="double"
    link="href: index.html; title: Strada ; visualAspectEnabled: false">
  </a-circle>
  
  <a-text
    value="Torna indietro"
    align="center"
    position="0.5 0 -2"
    scale="2 2 2"
    color="#FFFFFF"
    font="roboto"
    rotation="0 180 0">
  </a-text>

  </a-entity>

            
      <a-entity id="camera-rig" position="11 0 0" rotation = "0 0 0">
        <a-entity 
          id="user-camera" 
          camera 
          look-controls 
          wasd-controls="acceleration: 20;"
          cursor="rayOrigin: mouse"
          raycaster="objects: .clickable">
          <a-cursor color="#2196F3"></a-cursor>
        </a-entity>
      </a-entity>

    </a-scene>
  </body>
</html>
