   <!--muri invisibili, uso un java script--> 
    <script>
AFRAME.registerComponent('muri-invisibili', {
  init: function () {
    this.keys = {};
    window.addEventListener('keydown', (e) => { this.keys[e.key.toLowerCase()] = true; });
    window.addEventListener('keyup', (e) => { this.keys[e.key.toLowerCase()] = false; });
  },

  tick: function (time, timeDelta) {
    if (!timeDelta) return;

    var el = this.el;
    var position = el.object3D.position;
    var rotation = el.object3D.rotation;

    var speed = 0.005 * timeDelta; 

    var moveX = 0;
    var moveZ = 0;

    if (this.keys['w'] || this.keys['arrowup']) {
      moveX -= Math.sin(rotation.y);
      moveZ -= Math.cos(rotation.y);
    }
    if (this.keys['s'] || this.keys['arrowdown']) {
      moveX += Math.sin(rotation.y);
      moveZ += Math.cos(rotation.y);
    }
    if (this.keys['a'] || this.keys['arrowleft']) {
      moveX -= Math.cos(rotation.y);
      moveZ += Math.sin(rotation.y);
    }
    if (this.keys['d'] || this.keys['arrowright']) {
      moveX += Math.cos(rotation.y);
      moveZ -= Math.sin(rotation.y);
    }

    var prossimaX = position.x + moveX * speed;
    var prossimaZ = position.z + moveZ * speed;

    // Limiti della stanza (Modificali se ti ritrovi bloccato fuori dal modello)
    var limiteDestra = 10;    
    var limiteSinistra = -9;   
    var limiteDietro = 19;    
    var limiteAvanti = -16;   

    if (prossimaX <= limiteDestra && prossimaX >= limiteSinistra) {
      position.x = prossimaX;
    }
    if (prossimaZ <= limiteDietro && prossimaZ >= limiteAvanti) {
      position.z = prossimaZ;
    }
  }
});
    </script>
